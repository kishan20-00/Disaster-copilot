<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Personal multilingual disaster co-pilot with human-in-the-loop safety. Designed for the Shibuya Gemini AI Hackathon.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mamori AI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Mamori AI - Personal Disaster Co-pilot</title>
  <link rel="manifest" href="manifest.json">

  <!-- Style to center the loading state and frame on desktops -->
  <style>
    body {
      background-color: #0f172a;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    #loading-container {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      color: white;
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      width: 36px;
      height: 46px;
      border-radius: 50%;
      border-left-color: #8b5cf6;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading-text {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: #94a3b8;
    }
  </style>
  <script src="flutter.js" defer></script>
</head>
<body>
  <div id="loading-container">
    <div class="spinner"></div>
    <div class="loading-text">Initializing Mamori AI...</div>
  </div>
  <script>
    window.addEventListener('load', function(ev) {
      // Download flutter.js
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
