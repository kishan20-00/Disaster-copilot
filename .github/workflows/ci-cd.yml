name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  CLOUD_RUN_SERVICE: disaster-copilot
  CLOUD_RUN_REGION: us-central1
  GCP_PROJECT_ID: quiet-light-500701-m5

jobs:
  build-and-test:
    name: 🧪 Build & Test Verification
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 📝 Generate .env from Secrets
        # Vite inlines VITE_* at build time, so every client key must be present
        # now. Missing secrets (e.g. on fork PRs) just fall back to the app's
        # built-in offline behavior — the build still succeeds.
        run: |
          {
            echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}"
            echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}"
            echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}"
            echo "VITE_GEMINI_MODEL=${{ secrets.VITE_GEMINI_MODEL }}"
          } > .env

      - name: 🔍 Lint (oxlint)
        run: npm run lint

      - name: 🧱 Type-check & Production Build
        run: npm run build

  deploy-to-cloud-run:
    name: 🚀 Deploy to Google Cloud Run
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Enables Workload Identity Federation (preferred over SA keys)

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🔑 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # Prefer Workload Identity Federation. To switch, replace credentials_json
          # with `workload_identity_provider` + `service_account`.
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 📝 Generate .env for the Container Build
        # Uploaded to Cloud Build (see .gcloudignore) so `npm run build` inside the
        # Dockerfile bakes these VITE_* values into the served bundle.
        run: |
          {
            echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}"
            echo "VITE_GOOGLE_MAPS_API_KEY=${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}"
            echo "VITE_GEMINI_API_KEY=${{ secrets.VITE_GEMINI_API_KEY }}"
            echo "VITE_GEMINI_MODEL=${{ secrets.VITE_GEMINI_MODEL }}"
          } > .env

      - name: ⚡ Build Container & Deploy to Cloud Run
        run: |
          gcloud run deploy "${CLOUD_RUN_SERVICE}" \
            --source . \
            --project "${GCP_PROJECT_ID}" \
            --region "${CLOUD_RUN_REGION}" \
            --platform managed \
            --port 8080 \
            --allow-unauthenticated \
            --quiet
