name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    name: 🧪 Build & Test Verification
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-cache: npm
          node-version: 20

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 📝 Create Temp .env for Build Test
        run: |
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" > .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env

      - name: 🛠️ Run TypeScript & Vite Production Build
        run: npm run build

  deploy-to-cloud-run:
    name: 🚀 Deploy to Google Cloud Run
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # Required for Google Workload Identity Federation

    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4

      - name: 🔑 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # Note: Recommended approach is Workload Identity Federation.
          # Alternatively, you can use a Service Account Key stored in GitHub Secrets.
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ☁️ Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: 📝 Create .env file for Deployment Build
        run: |
          echo "VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID }}" > .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env

      - name: ⚡ Build Container and Deploy to Cloud Run
        run: |
          gcloud run deploy disaster-copilot \
            --source . \
            --region us-central1 \
            --allow-unauthenticated \
            --project quiet-light-500701-m5
